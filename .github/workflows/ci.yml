name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform 構文チェック
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"
      - name: terraform fmt
        run: terraform fmt --check -recursive
      - name: terraform init
        run: terraform init -backend=false -input=false
      - name: terraform validate
        run: terraform validate

  test:
    name: Python ユニットテスト
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ap-northeast-1
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: install deps
        run: pip install pytest pytest-cov boto3 botocore
      - name: pytest
        run: pytest lambda/test_index.py -v --cov=lambda --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          fail_ci_if_error: false

  security:
    name: Checkov セキュリティスキャン
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          # PoC 環境として意図的にスキップ（本番化時は個別に対応）
          skip_check: >-
            CKV_AWS_41,CKV_AWS_93,
            CKV_AWS_56,CKV_AWS_53,CKV_AWS_54,CKV_AWS_55,
            CKV_AWS_57,CKV_AWS_20,CKV_AWS_19,CKV_AWS_21,
            CKV_AWS_18,CKV_AWS_144,CKV_AWS_145,
            CKV2_AWS_6,CKV2_AWS_61,CKV2_AWS_62,CKV2_AWS_16,
            CKV_AWS_60,CKV_AWS_61,CKV_AWS_62,CKV_AWS_63,
            CKV_AWS_274,CKV_AWS_286,CKV_AWS_287,CKV_AWS_288,CKV_AWS_289,CKV_AWS_290,
            CKV_AWS_355,CKV2_AWS_40,CKV2_AWS_56,CKV2_AWS_75,
            CKV_AWS_337,CKV2_AWS_34,
            CKV_AWS_50,CKV_AWS_66,CKV_AWS_363,CKV_AWS_45,
            CKV_AWS_301,CKV_AWS_364,
            CKV_AWS_117,CKV_AWS_272,CKV_AWS_116,CKV_AWS_115,
            CKV_AWS_173,CKV_AWS_158,CKV_AWS_338,
            CKV_AWS_28,CKV_AWS_119,CKV_AWS_284,CKV_AWS_285
          output_format: cli

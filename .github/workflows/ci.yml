name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform 構文チェック
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
      - name: terraform fmt
        run: terraform fmt --check -recursive
      - name: terraform init
        run: terraform init -backend=false -input=false
      - name: terraform validate
        run: terraform validate

  test:
    name: Python ユニットテスト
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ap-northeast-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: pip install pytest boto3 botocore
      - name: pytest
        run: pytest lambda/test_index.py -v

  security:
    name: Checkov セキュリティスキャン
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          skip_check: >-
            CKV_AWS_117,CKV_AWS_272,
            CKV_AWS_116,CKV_AWS_115,
            CKV_AWS_28,CKV_AWS_119,
            CKV_AWS_145,CKV_AWS_173,
            CKV_AWS_158,CKV_AWS_338,
            CKV_AWS_18,CKV_AWS_144,
            CKV2_AWS_62,CKV_AWS_290,
            CKV_AWS_355,CKV_AWS_284,
            CKV_AWS_285
          output_format: cli
